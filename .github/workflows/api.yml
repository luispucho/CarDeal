name: Build & Deploy API

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'src/CarDeal.Api/**'
      - '.github/workflows/api.yml'
  pull_request:
    branches: [master]
    paths:
      - 'src/CarDeal.Api/**'

env:
  DOTNET_VERSION: '9.0.x'
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_API_APP_NAME }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/CarDeal.Api/CarDeal.Api.csproj

      - name: Build
        run: dotnet build src/CarDeal.Api/CarDeal.Api.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish src/CarDeal.Api/CarDeal.Api.csproj --configuration Release --no-build --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-package
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.webapp-url }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: api-package
          path: ./publish

      - name: Deploy to Azure App Service
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: ./publish
